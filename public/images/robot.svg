<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Soft background circle -->
  <circle cx="200" cy="200" r="185" fill="#E8F4FD" opacity="0.5"/>

  <!-- Robot body -->
  <g transform="translate(120, 90)">
    <!-- Antenna -->
    <line x1="80" y1="0" x2="80" y2="20" stroke="#1E4B8E" stroke-width="3" stroke-linecap="round"/>
    <circle cx="80" cy="0" r="6" fill="#3B82F6"/>

    <!-- Head -->
    <rect x="30" y="20" width="100" height="80" rx="20" fill="#1E4B8E"/>
    <!-- Face plate -->
    <rect x="40" y="30" width="80" height="60" rx="14" fill="#E8F4FD" opacity="0.15"/>
    <!-- Eyes -->
    <circle cx="60" cy="55" r="10" fill="#E8F4FD"/>
    <circle cx="100" cy="55" r="10" fill="#E8F4FD"/>
    <circle cx="60" cy="55" r="5" fill="#3B82F6"/>
    <circle cx="100" cy="55" r="5" fill="#3B82F6"/>
    <!-- Eye shine -->
    <circle cx="57" cy="52" r="2" fill="white"/>
    <circle cx="97" cy="52" r="2" fill="white"/>
    <!-- Friendly smile -->
    <path d="M65 72 Q80 82 95 72" stroke="#E8F4FD" stroke-width="2.5" fill="none" stroke-linecap="round"/>

    <!-- Neck -->
    <rect x="65" y="100" width="30" height="15" rx="4" fill="#183C72"/>

    <!-- Body -->
    <rect x="20" y="115" width="120" height="90" rx="18" fill="#1E4B8E"/>
    <!-- Body panel -->
    <rect x="35" y="128" width="90" height="64" rx="12" fill="#E8F4FD" opacity="0.1"/>
    <!-- Chest indicator -->
    <circle cx="80" cy="150" r="12" fill="#183C72"/>
    <circle cx="80" cy="150" r="7" fill="#3B82F6"/>
    <circle cx="80" cy="150" r="3" fill="#E8F4FD"/>
    <!-- Body lines -->
    <rect x="50" y="172" width="60" height="4" rx="2" fill="#3B82F6" opacity="0.4"/>
    <rect x="58" y="182" width="44" height="4" rx="2" fill="#3B82F6" opacity="0.3"/>

    <!-- Left arm -->
    <rect x="-8" y="120" width="24" height="60" rx="12" fill="#183C72"/>
    <!-- Left hand waving -->
    <circle cx="4" cy="185" r="12" fill="#1E4B8E"/>

    <!-- Right arm -->
    <rect x="144" y="120" width="24" height="60" rx="12" fill="#183C72"/>
    <!-- Right hand -->
    <circle cx="156" cy="185" r="12" fill="#1E4B8E"/>
  </g>

  <!-- Chat bubbles floating around the robot -->
  <!-- Bubble 1 - right -->
  <g transform="translate(285, 100)">
    <rect x="0" y="0" width="75" height="45" rx="12" fill="#1E4B8E"/>
    <polygon points="10,45 22,45 6,57" fill="#1E4B8E"/>
    <rect x="12" y="12" width="35" height="5" rx="2.5" fill="white" opacity="0.8"/>
    <rect x="12" y="22" width="50" height="5" rx="2.5" fill="white" opacity="0.5"/>
    <rect x="12" y="32" width="25" height="5" rx="2.5" fill="white" opacity="0.5"/>
  </g>

  <!-- Bubble 2 - left -->
  <g transform="translate(30, 170)">
    <rect x="0" y="0" width="65" height="40" rx="10" fill="#3B82F6"/>
    <polygon points="50,40 60,40 55,50" fill="#3B82F6"/>
    <rect x="10" y="11" width="30" height="4" rx="2" fill="white" opacity="0.8"/>
    <rect x="10" y="20" width="44" height="4" rx="2" fill="white" opacity="0.5"/>
    <rect x="10" y="29" width="20" height="4" rx="2" fill="white" opacity="0.5"/>
  </g>

  <!-- Small floating elements -->
  <!-- Sparkle top-left -->
  <g transform="translate(60, 80)" opacity="0.4">
    <line x1="0" y1="-7" x2="0" y2="7" stroke="#3B82F6" stroke-width="2"/>
    <line x1="-7" y1="0" x2="7" y2="0" stroke="#3B82F6" stroke-width="2"/>
  </g>
  <!-- Sparkle bottom-right -->
  <g transform="translate(345, 300)" opacity="0.35">
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#3B82F6" stroke-width="2"/>
    <line x1="-6" y1="0" x2="6" y2="0" stroke="#3B82F6" stroke-width="2"/>
  </g>

  <!-- Small dots -->
  <circle cx="50" cy="310" r="3" fill="#1E4B8E" opacity="0.2"/>
  <circle cx="340" cy="110" r="3" fill="#1E4B8E" opacity="0.2"/>
  <circle cx="355" cy="250" r="2" fill="#3B82F6" opacity="0.25"/>
  <circle cx="45" cy="140" r="2" fill="#3B82F6" opacity="0.25"/>

  <!-- Connection dots between robot and bubbles -->
  <circle cx="290" cy="175" r="3" fill="#3B82F6" opacity="0.4"/>
  <circle cx="300" cy="160" r="2" fill="#3B82F6" opacity="0.3"/>
  <circle cx="105" cy="210" r="3" fill="#3B82F6" opacity="0.4"/>
  <circle cx="95" cy="200" r="2" fill="#3B82F6" opacity="0.3"/>
</svg>
